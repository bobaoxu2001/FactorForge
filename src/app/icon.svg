<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FactorForge">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1426" />
      <stop offset="1" stop-color="#02040b" />
    </linearGradient>
    <linearGradient id="alpha" x1="14" y1="46" x2="50" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" />
      <stop offset="1" stop-color="#34d399" />
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="url(#bg)" stroke="#1c2c44" stroke-width="1.5" />
  <!-- radar rings from the signal origin -->
  <g stroke="#22d3ee" fill="none" stroke-linecap="round" opacity="0.35">
    <path d="M14 50 a14 14 0 0 1 14 -14" stroke-width="1.6" />
    <path d="M14 50 a23 23 0 0 1 23 -23" stroke-width="1.4" opacity="0.7" />
    <path d="M14 50 a32 32 0 0 1 32 -32" stroke-width="1.2" opacity="0.45" />
  </g>
  <!-- ascending alpha signal line -->
  <path d="M14 50 L26 38 L34 43 L50 17" stroke="url(#alpha)" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <!-- signal node -->
  <circle cx="50" cy="17" r="4.6" fill="#34d399" />
  <circle cx="50" cy="17" r="4.6" fill="none" stroke="#bbf7d0" stroke-width="1.1" opacity="0.6" />
  <circle cx="14" cy="50" r="2.4" fill="#22d3ee" />
</svg>
